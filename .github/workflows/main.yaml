name: Testing & Deploying the application

on:
    push:
        branches:
            - main

jobs:
    proof-of-concept-one_check-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Run check-tests
              run: |
                    cd ./proof-of-concept-one
                    npm install
                    npm run test:check
    proof-of-concept-one_unit-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Run unit-tests
              run: |
                    cd ./proof-of-concept-one
                    npm install
                    npm run test:unit
    proof-of-concept-one_build-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 20.x
            -   name: Build the application
                run: |
                    cd ./proof-of-concept-one
                    npm install
                    npm run build
    proof-of-concept-one_docker-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v5
            -   name: Run docker container
                run: |
                    cd ./proof-of-concept-one
                    docker build -t app ./
                    docker run -d -p 80:80 --name container app
                    docker stop container
                    docker rm container
    proof-of-concept-two_check-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Run check-tests
              run: |
                    cd ./proof-of-concept-two
                    npm install
                    npm run test:check
    proof-of-concept-two_unit-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                node-version: 20.x
            - name: Run unit-tests
              run: |
                    cd ./proof-of-concept-two
                    npm install
                    npm run test:unit
    proof-of-concept-two_build-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 20.x
            -   name: Build the application
                run: |
                    cd ./proof-of-concept-two
                    npm install
                    npm run build
    proof-of-concept-two_docker-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v5
            -   name: Run docker container
                run: |
                    cd ./proof-of-concept-two
                    docker build -t app ./
                    docker run -d -p 80:80 --name container app
                    docker stop container
                    docker rm container
    prototype_check-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            #- name: Setup NodeJS
            #  uses: actions/setup-node@v4
            #  with:
            #    node-version: 20.x
            #- name: Run check-tests
            #  run: |
            #        cd ./prototype
            #        npm install
            #        npm run test:check
    prototype_unit-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            #- name: Setup NodeJS
            #  uses: actions/setup-node@v4
            #  with:
            #    node-version: 20.x
            #- name: Run unit-tests
            #  run: |
            #        cd ./prototype
            #        npm install
            #        npm run test:unit
    prototype_build-test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 20.x
            -   name: Build the application
                run: |
                    cd ./prototype
                    npm install
                    npm run build
    prototype_docker-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code
              uses: actions/checkout@v5
            -   name: Run docker container
                run: |
                    cd ./prototype
                    docker build -t app ./
                    docker run -d -p 80:80 --name container app
                    docker stop container
                    docker rm container
    prototype-build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout the code
                uses: actions/checkout@v5
            -   name: Setup NodeJS
                uses: actions/setup-node@v4
                with:
                    node-version: 20.x
            -   name: Build the application
                run: |
                    cd ./prototype
                    npm install
                    npm run build
            -   name: Upload build artifact
                uses: actions/upload-artifact@v4
                with:
                    name: prototype_build
                    path: ./build
    app-deployment:
        needs: [prototype-build]
        environment:
            name: github-pages
            url: ${ steps.deployment.outputs.page_url }}
        permissions:
            contents: read
            id-token: write
            pages: write
            actions: write
            checks: write
            deployments: write
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout the code
                uses: actions/checkout@v5
            -   name: Download build artifact
                uses: actions/download-artifact@v4
                with:
                    name: prototype_build
                    path: ./build
            -   name: Setup pages
                uses: actions/configure-pages@v5
            -   name: Upload artifacts
                uses: actions/upload-pages-artifact@v3
                with:
                    path: ./build
            -   name: Deploy to GitHub-Pages
                uses: actions/deploy-pages@v4
                id: deployment
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
